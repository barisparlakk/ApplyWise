name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: applywise_test
          POSTGRES_PASSWORD: applywise
          POSTGRES_USER: applywise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U applywise -d applywise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://applywise:applywise@localhost:5432/applywise_test
      TEST_DATABASE_URL: postgresql+psycopg://applywise:applywise@localhost:5432/applywise_test
      EMBEDDING_PROVIDER: deterministic
      LLM_PROVIDER: local
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            api/pyproject.toml
            api/constraints.txt
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install -c constraints.txt -e ".[dev]"
      - run: python -m pip check
      - run: ruff check .
      - run: alembic upgrade head
      - run: alembic check
      - run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config --quiet
      - run: docker build --target production -t applywise-api-ci ./api
      - run: docker build --target production -t applywise-web-ci ./web
      - run: docker build -f Dockerfile.render-free -t applywise-render-free-ci .
